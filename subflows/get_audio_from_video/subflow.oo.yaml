nodes:
  - node_id: read_media_to_ffmpeg#1
    title: "Read Media To FFmpeg #1"
    inputs_from:
      - handle: video_source
        from_flow:
          - input_handle: video_source
    task: self::read_media_to_ffmpeg
  - node_id: audio_video_separation#1
    title: "Audio Video Separation #1"
    inputs_from:
      - handle: ffmpeg_source
        from_node:
          - node_id: read_media_to_ffmpeg#1
            output_handle: ffmpeg_source
    task: self::audio_video_separation
  - node_id: save_audio#1
    title: "Save Audio #1"
    inputs_from:
      - handle: audio_source
        from_node:
          - node_id: audio_video_separation#1
            output_handle: only_audio
      - handle: save_address
        from_flow:
          - input_handle: save_address
    task: self::save_audio
inputs_def:
  - handle: video_source
    description: Input
    json_schema:
      type: string
      ui:widget: file
    nullable: false
    executor_name: nodejs
  - handle: save_address
    json_schema:
      type: string
      ui:widget: save
      ui:options:
        excludeAll: true
        filters:
          - name: MP3
            extensions:
              - mp3
    nullable: true
    executor_name: nodejs
outputs_def:
  - handle: file_adress
    json_schema:
      type: string
      ui:widget: file
    nullable: false
    description: Output
    executor_name: nodejs
outputs_from:
  - handle: file_adress
    from_node:
      - node_id: save_audio#1
        output_handle: file_adress
title: Get Audio from Video
description: 传入一个视频的地址，获取音频文件，存入目标地址
icon: ":carbon:mobile-audio:"
