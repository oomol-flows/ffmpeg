description: Create a deep copy of FFmpeg source object to enable independent
  processing without affecting the original source
title: Cloned FFmpeg
inputs_def:
  - handle: ffmpeg_source
    description: Original FFmpeg source object to be cloned
    json_schema:
      contentMediaType: oomol/var
outputs_def:
  - handle: cloned_ffmpeg
    description: Independent copy of the FFmpeg source object
    json_schema:
      contentMediaType: oomol/var
ui:
  default_width: 450
executor:
  name: nodejs
  options:
    spawn: false
    entry: main.ts
icon: ":carbon:copy:"
private: true
