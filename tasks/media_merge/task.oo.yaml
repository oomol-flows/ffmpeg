description: Merge video, audio, and subtitle files into a single media file
  with customizable output format and quality settings
title: Media Merge
inputs_def:
  - handle: video_file
    description: Primary video file to merge with audio and subtitles
    json_schema:
      type: string
      ui:widget: file
  - handle: audio_file
    description: Audio file to merge with the video (optional)
    json_schema:
      type: string
      ui:widget: file
    value:
    nullable: true
  - handle: srt
    description: Subtitle file in SRT format to embed in the output (optional)
    json_schema:
      type: string
      ui:widget: file
    value:
    nullable: true
  - handle: formate
    json_schema:
      enum:
        - mp4
        - wmv
        - mov
        - gif
        - flv
        - avi
      ui:options:
        labels:
          - MP4
          - WMV
          - MOV
          - GIF
          - FLV
          - AVI
    value:
    nullable: true
  - handle: file_name
    json_schema:
      type: string
    value:
    nullable: true
  - handle: save_address
    json_schema:
      type: string
      ui:widget: file
    value:
    nullable: true
outputs_def:
  - handle: media_file
    description: Output
    json_schema:
      type: string
      ui:widget: file
ui:
  default_width: 450
executor:
  name: nodejs
  options:
    spawn: false
    entry: main.ts
icon: ":carbon:merge:"
