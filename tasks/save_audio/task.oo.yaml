description: Save processed audio data to file system with customizable output
  format, quality settings, and destination path
title: Save Audio
inputs_def:
  - handle: audio_source
    description: Processed audio source to be saved
    json_schema:
      contentMediaType: oomol/var
    kind: audio
  - handle: save_address
    description: Destination file path for saving the audio file
    json_schema:
      type: string
      ui:widget: save
      ui:options:
        excludeAll: true
        filters:
          - name: MP3
            extensions:
              - mp3
    value:
    nullable: true
outputs_def:
  - handle: file_adress
    description: Absolute path of the saved audio file
    json_schema:
      type: string
      ui:widget: file
icon: ":carbon:document-audio:"
ui:
  default_width: 447.06350824621484
executor:
  name: nodejs
  options:
    spawn: false
    entry: main.ts
private: true
