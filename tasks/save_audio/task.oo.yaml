inputs_def:
  - handle: audio_source
    description: Input
    json_schema:
      contentMediaType: oomol/var
    kind: audio
  - handle: save_address
    json_schema:
      type: string
      ui:widget: save
      ui:options:
        excludeAll: true
        filters:
          - name: MP3
            extensions:
              - mp3
    value:
    nullable: true
outputs_def:
  - handle: file_adress
    description: Output
    json_schema:
      type: string
      ui:widget: file
icon: ":carbon:document-audio:"
ui:
  default_width: 447.06350824621484
executor:
  name: nodejs
  options:
    spawn: false
    entry: main.ts
title: Save Audio
private: true
