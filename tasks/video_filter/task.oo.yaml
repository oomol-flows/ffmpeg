description: Apply various video filters and effects to enhance or modify video
  content including color correction, scaling, rotation, and special effects
title: Video Filter
ui:
  default_width: 450
inputs_def:
  - handle: ffmpeg_source
    description: FFmpeg source object to apply video filters to
    json_schema:
      contentMediaType: oomol/var
  - handle: videoFilter
    description: FFmpeg filter string defining the video effects to apply
    json_schema:
      type: string
outputs_def:
  - handle: ffmpeg_source
    description: Filtered FFmpeg source object with applied effects
    json_schema:
      contentMediaType: oomol/var
executor:
  name: nodejs
  options:
    entry: main.ts
    spawn: false
icon: ":carbon:filter:"
private: true
