description: Read and load video files into FFmpeg format for processing,
  supporting various video formats and codecs
title: Read Media To FFmpeg
inputs_def:
  - handle: video_source
    description: Path to the video file to be loaded into FFmpeg
    json_schema:
      type: string
      ui:widget: file
outputs_def:
  - handle: ffmpeg_source
    description: FFmpeg-compatible source object ready for processing
    json_schema:
      contentMediaType: oomol/var
  - handle: file_address
    description: Absolute file path of the loaded video
    json_schema:
      type: string
      minLength: 1
      ui:widget: file
  - handle: file_name
    description: Original filename of the loaded video
    json_schema:
      type: string
icon: ":carbon:port-input:"
ui:
  default_width: 350
executor:
  name: nodejs
  options:
    spawn: false
    entry: main.ts
private: true
