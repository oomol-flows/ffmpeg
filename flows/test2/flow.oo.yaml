nodes:
  - task: self::merged_audio
    title: "Merged Audio #2"
    node_id: merged-audio#2
    inputs_from:
      - handle: audio_files
        from_node:
          - node_id: list_files_from_folder#1
            output_handle: file_paths
      - handle: save_address
  - task: oomol-file::list_files_from_folder
    title: "List files from folder #1"
    node_id: list_files_from_folder#1
    inputs_from:
      - handle: folder
      - handle: sort
        value: false
      - handle: traverse
        value: false
      - handle: absolute_path
        value: true
  - node_id: media_merge#1
    title: "Media Merge #1"
    inputs_from:
      - handle: video_file
      - handle: audio_file
        value: null
      - handle: srt
        value: null
      - handle: formate
        value: null
      - handle: file_name
        value: null
      - handle: save_address
        value: null
    task: self::media_merge
  - node_id: merged_audio#1
    title: "Merged Audio #1"
    inputs_from:
      - handle: audio_files
      - handle: save_address
        value: null
    task: self::merged_audio
  - node_id: intercept-video#1
    title: "Intercept Video #1"
    inputs_from:
      - handle: video_source
        value: /oomol-driver/desktop/一口气了解稳定币.mp4
      - handle: start_time
        value: 100
      - handle: end_time
        value: 130
      - handle: file_name
        value: 一口气了解稳定币.mp4
      - handle: format
        value: null
      - handle: save_address
        value: null
    subflow: self::intercept-video
